<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flynn Zito — Analyst War Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="scanline"></div>

  <header>
    <div class="header-left">
      <div class="logo-mark">FZ</div>
      <div>
        <div class="header-title">Flynn Zito Capital Management</div>
        <div class="header-sub">Analyst War Room <span class="live-dot"></span> <span>LIVE</span></div>
      </div>
    </div>
    <div class="header-right">
      <div class="clock" id="clock">--:--:--</div>
      <div class="date" id="dateline">---</div>
      <div class="refresh-info">Auto-refresh <span id="countdown">30</span>s</div>
    </div>
  </header>

  <main>

    <!-- INDICES ROW — populated by JS -->
    <section class="indices-row" id="indices-row"></section>

    <!-- MAIN GRID -->
    <div class="main-grid">

      <!-- CHART PANEL — TradingView widget -->
      <div class="panel chart-panel">
        <div class="panel-header">
          <span class="panel-title">Price Chart</span>
          <div class="chart-controls">
            <select id="ticker-select"></select>
          </div>
        </div>
        <div class="tv-chart-wrap" id="tv-chart-wrap">
          <!-- TradingView widget injected here by JS -->
        </div>
      </div>

      <!-- NEWS PANEL -->
      <div class="panel news-panel">
        <div class="panel-header">
          <span class="panel-title">Market News</span>
          <span class="panel-badge">Live feed</span>
        </div>
        <div class="news-list" id="news-list">
          <div class="news-loading">Fetching latest news...</div>
        </div>
      </div>

    </div>

    <!-- WATCHLIST -->
    <div class="panel watchlist-panel">
      <div class="panel-header">
        <span class="panel-title">Watchlist</span>
        <span class="panel-badge" id="market-status">—</span>
      </div>
      <div class="watchlist-table-wrap">
        <table class="watchlist-table">
          <thead>
            <tr>
              <th>Ticker</th>
              <th>Name</th>
              <th>Price</th>
              <th>Change</th>
              <th>% Chg</th>
              <th>High</th>
              <th>Low</th>
              <th>Open</th>
              <th>Signal</th>
            </tr>
          </thead>
          <tbody id="watchlist-body">
            <!-- shimmer rows -->
            <tr class="shimmer-row"><td colspan="9"><div class="shimmer"></div></td></tr>
            <tr class="shimmer-row"><td colspan="9"><div class="shimmer"></div></td></tr>
            <tr class="shimmer-row"><td colspan="9"><div class="shimmer"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <footer>
    <span>Flynn Zito Capital Management &mdash; Internal Use Only</span>
    <span id="last-updated">Updating...</span>
  </footer>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
